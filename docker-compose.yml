services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: socialstack
      POSTGRES_USER: socialstack
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialstack"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uvicorn socialstack.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://socialstack:password@postgres:5432/socialstack
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - media_data:/app/data/media

  worker-default:
    build: .
    command: celery -A socialstack.celery_app worker -Q default -c 4 --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://socialstack:password@postgres:5432/socialstack
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - media_data:/app/data/media

  worker-images:
    build: .
    command: celery -A socialstack.celery_app worker -Q images -c 2 --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://socialstack:password@postgres:5432/socialstack
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - media_data:/app/data/media

  worker-publishing:
    build: .
    command: celery -A socialstack.celery_app worker -Q publishing -c 8 --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://socialstack:password@postgres:5432/socialstack
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  worker-metrics:
    build: .
    command: celery -A socialstack.celery_app worker -Q metrics -c 2 --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://socialstack:password@postgres:5432/socialstack
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  beat:
    build: .
    command: celery -A socialstack.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  flower:
    build: .
    command: celery -A socialstack.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
  media_data:
